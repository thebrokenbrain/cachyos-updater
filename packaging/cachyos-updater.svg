<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="cat" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fafafa"/>
      <stop offset="100%" stop-color="#e5e7eb"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="256" height="256" rx="48" ry="48" fill="url(#bg)"/>

  <!-- Anillo de actualización -->
  <g transform="translate(128 128)" stroke="#fde68a" stroke-width="6" fill="none" stroke-linecap="round">
    <path d="M -78 -8 A 78 78 0 1 1 -8 78" />
    <polygon points="-86,-18 -68,-18 -78,2" fill="#fde68a" stroke="none"/>
  </g>

  <!-- Cuerpo del gato -->
  <g transform="translate(128 142)">
    <!-- Orejas -->
    <polygon points="-46,-50 -28,-90 -10,-44" fill="url(#cat)"/>
    <polygon points="46,-50 28,-90 10,-44" fill="url(#cat)"/>
    <polygon points="-40,-52 -30,-78 -18,-48" fill="#7c3aed"/>
    <polygon points="40,-52 30,-78 18,-48" fill="#7c3aed"/>

    <!-- Cabeza -->
    <ellipse cx="0" cy="-14" rx="58" ry="50" fill="url(#cat)"/>

    <!-- Ojos -->
    <ellipse cx="-22" cy="-22" rx="8" ry="11" fill="#1e1e2e"/>
    <ellipse cx="22"  cy="-22" rx="8" ry="11" fill="#1e1e2e"/>
    <circle cx="-19" cy="-26" r="3" fill="#fafafa"/>
    <circle cx="25"  cy="-26" r="3" fill="#fafafa"/>

    <!-- Nariz y boca -->
    <polygon points="-4,-4 4,-4 0,2" fill="#f472b6"/>
    <path d="M 0 2 Q -8 10 -12 6" fill="none" stroke="#1e1e2e" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M 0 2 Q  8 10  12 6" fill="none" stroke="#1e1e2e" stroke-width="2.5" stroke-linecap="round"/>

    <!-- Bigotes -->
    <g stroke="#1e1e2e" stroke-width="1.5" stroke-linecap="round" opacity="0.8">
      <line x1="-30" y1="0"  x2="-54" y2="-4"/>
      <line x1="-30" y1="4"  x2="-54" y2="6"/>
      <line x1="30"  y1="0"  x2="54"  y2="-4"/>
      <line x1="30"  y1="4"  x2="54"  y2="6"/>
    </g>
  </g>

  <!-- Símbolo de descarga/refresh sobre la oreja derecha -->
  <g transform="translate(190 56)">
    <circle r="22" fill="#fbbf24"/>
    <path d="M 0 -10 L 0 6 M -7 -1 L 0 6 L 7 -1" stroke="#1e1e2e" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
